---
# gVisor runsc runtime installation configuration

# Architecture mapping
runsc_arch: "{{ 'x86_64' if ansible_machine == 'x86_64' else 'aarch64' if ansible_machine == 'aarch64' else ansible_machine }}"

# gVisor runsc download URL (latest release from Google)
runsc_download_url: "https://storage.googleapis.com/gvisor/releases/release/latest/runsc"
